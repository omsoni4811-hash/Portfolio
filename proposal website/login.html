  <style>
    h2{

    }

    #from{
      display: flex;

.login-card{
  background:#1e293b;
  padding:40px;
  border-radius:24px;
}

.login-card h2{
  margin-bottom:10px;
}

.login-card p{
  color:#cbd5e1;

}

.login-card input{
  width:100%;
  margin-bottom:15px;
  padding:15px;
  border:none;
  border-radius:14px;
  background:#334155;
  color:white;
  outline:none;
}

.login-card button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  background:#2563eb;
  color:white;
  font-weight:600;
  cursor:pointer;
}
